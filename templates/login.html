<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card">
            <div class="auth-header">
                <p class="eyebrow">Account</p>
                <h1>Login</h1>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-stack" role="status" aria-live="polite">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <form class="auth-form" id="loginForm" method="post" action="{{ url_for('login') }}" novalidate>
                <input type="hidden" name="next" value="{{ next_url }}">

                <label class="form-group" for="username">
                    <span class="label-text">Username</span>
                    <input class="control" id="username" name="username" type="text" autocomplete="username" required>
                </label>

                <label class="form-group" for="password">
                    <span class="label-text">Password</span>
                    <input class="control" id="password" name="password" type="password" autocomplete="current-password" required>
                </label>

                <div class="form-error" id="authError" role="alert" hidden></div>

                <button type="submit" class="button primary-button">Login</button>
            </form>

            <p class="auth-footer">
                New here?
                <a class="text-link" href="{{ url_for('register') }}">Create an account</a>
            </p>
        </section>
    </main>
</body>
</html>
